<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrata Time Zones</title>
  <style>
    :root {
      --bg: #ffffff;
      --border: #e8ecf2;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --divider: #f1f4f8;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    .widget {
      padding: 18px 20px 14px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .header-icon {
      font-size: 15px;
      line-height: 1;
    }

    .header-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--divider);
    }

    .row:last-child {
      border-bottom: none;
    }

    .row-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .flag {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    .location {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .location-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .location-region {
      font-size: 11px;
      color: var(--muted);
    }

    .row-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .time {
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .time-meta {
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <span class="header-icon">🕒</span>
      <span class="header-title">Entrata Time Zones</span>
    </div>
    <div class="list" id="list"></div>
  </div>

  <script>
    const LOCATIONS = [
      { name: "Utah",      region: "Lehi, USA",    flag: "🇺🇸", timeZone: "America/Denver"    },
      { name: "India",     region: "Pune",          flag: "🇮🇳", timeZone: "Asia/Kolkata"      },
      { name: "Israel",    region: "Tel Aviv",      flag: "🇮🇱", timeZone: "Asia/Jerusalem"    },
      { name: "Amsterdam", region: "Netherlands",   flag: "🇳🇱", timeZone: "Europe/Amsterdam"  },
    ];

    function formatTime(timeZone, date) {
      return new Intl.DateTimeFormat("en-US", {
        timeZone,
        hour: "numeric",
        minute: "2-digit",
        hour12: true,
      }).format(date);
    }

    function formatDay(timeZone, date) {
      return new Intl.DateTimeFormat("en-US", {
        timeZone,
        weekday: "short",
        month: "short",
        day: "numeric",
      }).format(date);
    }

    function buildList() {
      const list = document.getElementById("list");
      for (const loc of LOCATIONS) {
        const row = document.createElement("div");
        row.className = "row";
        row.dataset.tz = loc.timeZone;
        row.innerHTML = `
          <div class="row-left">
            <span class="flag">${loc.flag}</span>
            <div class="location">
              <span class="location-name">${loc.name}</span>
              <span class="location-region">${loc.region}</span>
            </div>
          </div>
          <div class="row-right">
            <span class="time" data-role="time"></span>
            <span class="time-meta" data-role="day"></span>
          </div>
        `;
        list.appendChild(row);
      }
    }

    function render() {
      const now = new Date();
      document.querySelectorAll(".row").forEach((row) => {
        const tz = row.dataset.tz;
        row.querySelector('[data-role="time"]').textContent = formatTime(tz, now);
        row.querySelector('[data-role="day"]').textContent = formatDay(tz, now);
      });
    }

    function startClock() {
      render();
      const tick = () => {
        render();
        setTimeout(tick, 1000 - (Date.now() % 1000));
      };
      setTimeout(tick, 1000 - (Date.now() % 1000));
    }

    buildList();
    startClock();
  </script>
</body>
</html>
